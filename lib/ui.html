<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Faceless Studio</title>
<!--
  The whole interface, in one file. No build step, no bundler, no node_modules —
  `faceless start` serves this directly.

  Views are switched by the URL hash, so Back/Forward work and any view can be
  bookmarked or reloaded:

     #/dashboard        every project, with per-language status
     #/project/<id>     one project: visuals, per-language steps, actions
     #/review/<id>      click the pictures that don't fit
     #/run              live terminal, exact counts, elapsed and remaining
     #/new              paste a script, generate sheets
     #/voices[/<lang>]  audition and choose reference clips
     #/settings         machine check, keys, finished files

  One poll loop drives the whole app (900ms). It repaints the run view only when
  that view is open, but always keeps the sidebar badge current so you can walk
  away from a long build and still see it moving.
-->
<style>
/* ─── design tokens ──────────────────────────────────────────────────────── */
:root{
  --bg:#0f1115; --panel:#16181d; --panel2:#1c1f26; --line:#272b34;
  --ink:#e6e8ec; --ink2:#9aa1ad; --ink3:#6b7280;
  --accent:#f5a524; --accent-ink:#1a1204;
  --ok:#22c55e; --warn:#f5a524; --bad:#ef4444;
  --term-bg:#0b0d11; --term-ink:#c8d0dc;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.25);
  --r:10px;
}
html[data-theme="light"]{
  --bg:#f6f7f9; --panel:#fff; --panel2:#f2f4f7; --line:#e3e7ed;
  --ink:#141821; --ink2:#5b6371; --ink3:#8b93a1;
  --accent:#b45309; --accent-ink:#fff;
  --ok:#15803d; --warn:#b45309; --bad:#b91c1c;
  --term-bg:#12151b; --term-ink:#d6dce6;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);
  font:14px/1.55 ui-sans-serif,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  -webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button,input,select,textarea{font:inherit;color:inherit}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
h1{font-size:22px}
.mono,code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

/* ─── layout ─────────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:224px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);padding:18px 12px;
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
.brand{display:flex;align-items:center;gap:9px;padding:2px 8px 16px}
.dot{width:22px;height:22px;border-radius:6px;background:var(--accent);display:grid;
  place-items:center;color:var(--accent-ink);font-weight:800;font-size:12px}
.brand b{font-size:14.5px;letter-spacing:-.02em}
.nav{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;
  color:var(--ink2);cursor:pointer;border:1px solid transparent;font-size:13.5px}
.nav:hover{background:var(--panel2);color:var(--ink)}
.nav.on{background:var(--panel2);color:var(--ink);border-color:var(--line)}
.nav .ico{width:16px;text-align:center;opacity:.85;font-size:13px}
.badge{margin-left:auto;font-size:11px;background:var(--accent);color:var(--accent-ink);
  padding:1px 6px;border-radius:99px;font-weight:700;font-variant-numeric:tabular-nums}
.side .foot{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding:8px}
.main{padding:26px 30px 60px;max-width:1180px;width:100%}
.head{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.head .grow{flex:1;min-width:200px}
.head p{margin:4px 0 0;color:var(--ink2);font-size:13px}
.back{cursor:pointer;color:var(--ink3);font-size:12.5px}
.back:hover{color:var(--ink)}

/* ─── controls ───────────────────────────────────────────────────────────── */
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:550;
  transition:.12s;white-space:nowrap}
.btn:hover:not(:disabled){border-color:var(--ink3)}
.btn:disabled{opacity:.42;cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);font-weight:650}
.btn.primary:hover:not(:disabled){filter:brightness(1.08)}
.btn.sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn.danger{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 35%,var(--line))}
input[type=text],select,textarea{background:var(--bg);border:1px solid var(--line);
  border-radius:8px;padding:8px 10px;width:100%}
input:focus,select:focus,textarea:focus{
  outline:2px solid color-mix(in srgb,var(--accent) 45%,transparent);outline-offset:-1px}
label.chk{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--ink2)}
label.chk input{accent-color:var(--accent)}

/* ─── cards ──────────────────────────────────────────────────────────────── */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.card h3{font-size:14.5px;margin-bottom:2px}
.sub{color:var(--ink3);font-size:12px}
.card.click{cursor:pointer;transition:.13s}
.card.click:hover{border-color:var(--ink3);transform:translateY(-1px);box-shadow:var(--shadow)}

/* ─── status ─────────────────────────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;
  padding:2px 8px;border-radius:99px;border:1px solid}
.pill.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 34%,transparent);
  background:color-mix(in srgb,var(--ok) 11%,transparent)}
.pill.part{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 34%,transparent);
  background:color-mix(in srgb,var(--warn) 11%,transparent)}
.pill.none{color:var(--ink3);border-color:var(--line);background:var(--panel2)}
.pill.bad{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 34%,transparent);
  background:color-mix(in srgb,var(--bad) 11%,transparent)}
.langrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line)}
.langrow:first-of-type{border-top:0}
.lang{width:30px;font-weight:700;font-size:11.5px;color:var(--ink2);text-transform:uppercase}
.steps{display:flex;gap:4px;flex:1}
.step{flex:1;height:5px;border-radius:3px;background:var(--panel2)}
.step.done{background:var(--ok)}
.step.part{background:linear-gradient(90deg,var(--warn) var(--p,50%),var(--panel2) var(--p,50%))}
.steplabels{display:flex;gap:4px;margin-top:3px}
.steplabels span{flex:1;font-size:9.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--ink3);font-weight:650;padding:0 10px 8px}
td{padding:10px;border-top:1px solid var(--line);vertical-align:middle}

/* ─── terminal ───────────────────────────────────────────────────────────── */
.term{background:var(--term-bg);border:1px solid var(--line);border-radius:var(--r);
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;
  line-height:1.65;padding:12px 14px;height:400px;overflow:auto;color:var(--term-ink)}
.term .ln{display:flex;gap:10px;white-space:pre-wrap;word-break:break-word}
.term .ts{color:#4b5563;flex:none;-webkit-user-select:none;user-select:none}
.term .e{color:#f87171}.term .w{color:#fbbf24}.term .g{color:#4ade80}.term .d{color:#6b7280}
.termbar{display:flex;align-items:center;gap:10px;margin-bottom:8px}

/* ─── progress ───────────────────────────────────────────────────────────── */
.bar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:var(--accent);transition:width .3s ease}
.bar.idle i{background:var(--ink3)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:1px;
  background:var(--line);border:1px solid var(--line);border-radius:var(--r);
  overflow:hidden;margin-top:14px}
.stat{background:var(--panel);padding:12px 14px}
.stat b{display:block;font-size:20px;font-weight:650;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat span{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}

/* ─── misc ───────────────────────────────────────────────────────────────── */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.empty{text-align:center;padding:56px 20px;color:var(--ink2)}
.empty b{display:block;font-size:15px;color:var(--ink);margin-bottom:6px}
.sec{margin-bottom:11px;display:flex;align-items:center;gap:10px}
.sec h2{font-size:15px}
.hr{height:1px;background:var(--line);margin:22px 0}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:9px}
.thumb{position:relative;aspect-ratio:16/9;border-radius:7px;overflow:hidden;
  background:var(--panel2);border:2px solid transparent;cursor:pointer}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
.thumb.rej{border-color:var(--bad);opacity:.45}
.thumb.hero{border-color:var(--accent)}
.thumb .n{position:absolute;left:0;top:0;background:rgba(0,0,0,.72);color:#fff;
  font-size:10px;padding:1px 5px;border-radius:0 0 5px 0;font-weight:700}
.toast{position:fixed;right:18px;bottom:18px;background:var(--panel);border:1px solid var(--line);
  border-left:3px solid var(--accent);padding:11px 15px;border-radius:9px;
  box-shadow:var(--shadow);z-index:50;max-width:340px;font-size:13px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:grid;place-items:center;
  z-index:60;padding:20px}
.modal .box{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:20px;max-width:520px;width:100%;box-shadow:var(--shadow)}
.modal h3{font-size:16px;margin-bottom:6px}
.dgroup{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.dgroup:first-of-type{border-top:0}
.dgroup .what{flex:1}
.dgroup .what b{font-size:13px}
.spin{display:inline-block;width:11px;height:11px;border:2px solid var(--ink3);
  border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .side{position:static;height:auto;flex-direction:row;overflow-x:auto;align-items:center}
  .side .foot{margin:0;flex-direction:row}
  .brand{padding:0 12px 0 4px}
  .grid2{grid-template-columns:1fr}
  .main{padding:18px}
}
</style>

<div class="app">
  <aside class="side">
    <div class="brand"><span class="dot">F</span><b>Faceless</b></div>
    <a class="nav" data-r="#/dashboard"><span class="ico">▦</span>Dashboard</a>
    <a class="nav" data-r="#/run"><span class="ico">▶</span>Activity<span class="badge" id="navBadge" style="display:none"></span></a>
    <a class="nav" data-r="#/voices"><span class="ico">◍</span>Voices</a>
    <a class="nav" data-r="#/settings"><span class="ico">⚙</span>Settings</a>
    <div class="foot">
      <button class="btn sm" id="themeBtn">Light mode</button>
      <div class="sub mono">127.0.0.1:8765</div>
    </div>
  </aside>
  <main class="main" id="view"></main>
</div>
<div id="toast"></div>

<script>
// ═══ tiny helpers ═════════════════════════════════════════════════════════
const $ = s => document.querySelector(s);
const el = (t, a = {}, ...kids) => {
  const n = document.createElement(t);
  for (const [k, v] of Object.entries(a)) {
    if (v === null || v === undefined || v === false) continue;
    if (k === 'class') n.className = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k === 'checked' || k === 'selected' || k === 'muted') n[k] = !!v;
    else n.setAttribute(k, v);
  }
  for (const c of kids.flat(3)) {
    if (c === null || c === undefined || c === false) continue;
    n.append(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};
async function api(ep, body) {
  const r = await fetch(ep, body ? {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  } : {});
  const j = await r.json().catch(() => ({ error: 'the server sent something unreadable' }));
  if (j.error && body) toast(j.error, true);
  return j;
}
let toastT;
function toast(msg, bad) {
  clearTimeout(toastT);
  $('#toast').innerHTML = '';
  const n = el('div', { class: 'toast' }, msg);
  if (bad) n.style.borderLeftColor = 'var(--bad)';
  $('#toast').append(n);
  toastT = setTimeout(() => n.remove(), 5200);
}
const fmtT = s => {
  s = Math.max(0, Math.round(s || 0));
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m < 60 ? `${m}m ${String(s % 60).padStart(2, '0')}s`
                : `${Math.floor(m / 60)}h ${String(m % 60).padStart(2, '0')}m`;
};
const ago = ts => {
  if (!ts) return '';
  const d = (Date.now() / 1000) - ts;
  if (d < 90) return 'just now';
  if (d < 3600) return Math.round(d / 60) + ' min ago';
  if (d < 86400) return Math.round(d / 3600) + ' h ago';
  return Math.round(d / 86400) + ' d ago';
};

// ═══ theme ════════════════════════════════════════════════════════════════
// localStorage is correct here: this page is served from your own machine and
// the choice should survive a restart.
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  $('#themeBtn').textContent = t === 'light' ? 'Dark mode' : 'Light mode';
  try { localStorage.setItem('faceless.theme', t); } catch (e) { }
}
let _t = 'dark';
try { _t = localStorage.getItem('faceless.theme') || 'dark'; } catch (e) { }
applyTheme(_t);
$('#themeBtn').onclick = () =>
  applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');

// ═══ shared state ═════════════════════════════════════════════════════════
const S = { projects: [], music: [], status: {}, meta: {} };

// ═══ status maths ═════════════════════════════════════════════════════════
const STEPS = ['sheets', 'visuals', 'voice', 'render'];
function fractions(st, l) {
  const n = st.scenes || 0;
  return {
    sheets: l.sheets ? 1 : 0,
    visuals: n ? Math.min(1, (st.assets || 0) / n) : 0,
    voice: n ? Math.min(1, (l.voice_n || 0) / n) : 0,
    render: l.render ? 1 : 0,
  };
}
function overall(st) {
  const ls = Object.values(st.languages || {});
  if (!ls.length) return { cls: 'none', text: 'empty' };
  const done = ls.filter(l => l.render).length;
  if (done === ls.length) return { cls: 'ok', text: 'complete' };
  if (done > 0) return { cls: 'part', text: `${done}/${ls.length} rendered` };
  if (ls.some(l => l.voice_n > 0) || st.assets > 0) return { cls: 'part', text: 'in progress' };
  return { cls: 'none', text: 'not started' };
}
function stepBar(st, l) {
  const f = fractions(st, l);
  return el('div', {},
    el('div', { class: 'steps' }, STEPS.map(k => {
      const v = f[k];
      const d = el('div', { class: 'step ' + (v >= 1 ? 'done' : v > 0 ? 'part' : '') });
      if (v > 0 && v < 1) d.style.setProperty('--p', Math.round(v * 100) + '%');
      return d;
    })),
    el('div', { class: 'steplabels' }, STEPS.map(k => el('span', {}, k))));
}

// ═══ dashboard ════════════════════════════════════════════════════════════
async function viewDashboard() {
  const d = await api('/api/projects');
  S.projects = d.projects || []; S.music = d.music || [];
  S.meta = { has_keys: d.has_keys, has_gemini: d.has_gemini };
  const v = $('#view'); v.innerHTML = '';

  const scenes = S.projects.reduce((a, p) => a + (p.status?.scenes || 0), 0);
  const built = S.projects.reduce((a, p) =>
    a + Object.values(p.status?.languages || {}).filter(l => l.render).length, 0);

  v.append(el('div', { class: 'head' },
    el('div', { class: 'grow' }, el('h1', {}, 'Dashboard'),
      el('p', {}, `${S.projects.length} project${S.projects.length === 1 ? '' : 's'} · `
        + `${scenes} scenes · ${built} video${built === 1 ? '' : 's'} rendered`)),
    el('button', { class: 'btn', onclick: () => location.hash = '#/new' }, '+ New from script')));

  if (!d.has_keys) v.append(el('div', { class: 'card', style: 'border-color:var(--warn);margin-bottom:14px' },
    el('b', {}, 'No stock API keys yet. '), 'Sourcing visuals will not work — add them in Settings.'));

  if (!S.projects.length) {
    v.append(el('div', { class: 'empty card' }, el('b', {}, 'No projects yet'),
      'Put a master sheet in sheets/, or paste a script and let Gemini split it.',
      el('div', { style: 'margin-top:14px' },
        el('button', { class: 'btn primary', onclick: () => location.hash = '#/new' },
          'Start from a script'))));
    return;
  }

  v.append(el('div', { class: 'cards' }, S.projects.map(p => {
    const st = p.status || { languages: {}, scenes: 0, assets: 0 };
    const o = overall(st);
    return el('div', { class: 'card click', onclick: () => location.hash = '#/project/' + p.id },
      el('div', { class: 'row', style: 'justify-content:space-between;align-items:flex-start' },
        el('div', { style: 'min-width:0' }, el('h3', {}, p.id),
          el('div', { class: 'sub', style: 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap' },
            (p.label || '').replace(p.id + ' — ', ''))),
        el('span', { class: 'pill ' + o.cls }, o.text)),
      el('div', { style: 'margin:12px 0 4px' },
        Object.entries(st.languages || {}).map(([code, l]) =>
          el('div', { class: 'langrow' },
            el('span', { class: 'lang' }, code),
            stepBar(st, l),
            el('span', { class: 'sub mono', style: 'width:56px;text-align:right;flex:none' },
              l.render ? l.size_mb + ' MB' : `${l.voice_n || 0}/${st.scenes}`)))),
      el('div', { class: 'sub', style: 'margin-top:10px' },
        `${st.scenes} scenes · ${st.assets} visuals sourced`));
  })));
}

// ═══ project detail ═══════════════════════════════════════════════════════
async function viewProject(id) {
  if (!S.projects.length) {
    const d = await api('/api/projects');
    S.projects = d.projects || []; S.music = d.music || [];
  }
  const p = S.projects.find(x => x.id === id);
  const v = $('#view'); v.innerHTML = '';
  if (!p) { v.append(el('div', { class: 'empty card' }, el('b', {}, 'No such project'), id)); return; }
  const st = p.status || { languages: {}, scenes: 0, assets: 0 };
  const o = overall(st);

  v.append(el('div', { class: 'head' },
    el('div', { class: 'grow' },
      el('div', { class: 'back', onclick: () => location.hash = '#/dashboard' }, '← Dashboard'),
      el('h1', { style: 'margin-top:4px' }, p.id),
      el('p', {}, p.label || '')),
    el('div', { class: 'row' },
      el('span', { class: 'pill ' + o.cls }, o.text),
      el('button', { class: 'btn sm danger', onclick: () => askDelete(p.id) },
        'Delete…'))));

  // visuals ---------------------------------------------------------------
  const sourced = st.assets >= st.scenes && st.scenes > 0;
  v.append(el('div', { class: 'sec' }, el('h2', {}, 'Visuals'),
    el('span', { class: 'sub' }, 'sourced once, shared by every language')));
  v.append(el('div', { class: 'card', style: 'margin-bottom:22px' },
    el('div', { class: 'row' },
      el('button', {
        class: 'btn' + (st.assets ? '' : ' primary'),
        onclick: async e => {
          e.target.disabled = true;
          const r = await api('/api/source', { id: p.id });
          if (r.started) location.hash = '#/run'; else e.target.disabled = false;
        }
      }, st.assets ? 'Re-source all' : 'Find visuals'),
      st.assets ? el('button', { class: 'btn', onclick: () => location.hash = '#/review/' + p.id },
        'Review & swap pictures') : null,
      el('div', { style: 'flex:1' }),
      el('span', { class: 'pill ' + (sourced ? 'ok' : st.assets ? 'part' : 'none') },
        `${st.assets} / ${st.scenes}`))));

  // languages -------------------------------------------------------------
  const opts = { captions: true, zoom: true, music: '' };
  const run = async (langs, steps, force) => {
    const r = await api('/api/run', {
      id: p.id, langs, steps, force,
      captions: opts.captions, zoom: opts.zoom, music: opts.music || null
    });
    if (r.started) location.hash = '#/run';
  };

  v.append(el('div', { class: 'sec' }, el('h2', {}, 'Languages')));
  v.append(el('div', { class: 'card' },
    el('table', {},
      el('thead', {}, el('tr', {}, ['Language', 'Progress', 'Narration', 'Video', ''].map(h => el('th', {}, h)))),
      el('tbody', {}, Object.entries(st.languages || {}).map(([code, l]) => el('tr', {},
        el('td', {}, el('b', {}, l.name || code), el('div', { class: 'sub mono' }, code)),
        el('td', { style: 'width:210px' }, stepBar(st, l)),
        el('td', {}, l.voice ? el('span', { class: 'pill ok' }, 'complete')

const BUSY = ['generate', 'stock', 'voice', 'render'];
function paintRun() {
  const j = S.status || {};
  const card = $('#runCard'); if (!card) return;
  const busy = BUSY.includes(j.stage);
  const pct = j.total ? Math.round(100 * j.done / j.total) : 0;

  const sub = $('#runSub');
  if (sub) sub.textContent = busy ? `${j.project || ''} · ${j.label || j.stage}`
    : j.stage === 'error' ? 'Stopped with an error.'
      : j.stage === 'done' ? 'Finished.'
        : j.stage === 'approve' ? 'Visuals ready to review.' : 'Nothing running.';

  card.innerHTML = '';
  card.append(
    el('div', { class: 'row', style: 'margin-bottom:10px' },
      busy ? el('span', { class: 'spin' }) : null,
      el('b', {}, busy ? (j.label || j.stage)
        : j.stage === 'error' ? 'Error' : j.stage === 'done' ? 'Done' : 'Idle'),
      el('div', { style: 'flex:1' }),
      el('span', { class: 'mono sub' }, j.total ? `${j.done} / ${j.total}` : '')),
    el('div', { class: 'bar' + (busy ? '' : ' idle') }, el('i', { style: `width:${pct}%` })),
    j.error ? el('div', { class: 'card', style: 'margin-top:12px;border-color:var(--bad);color:var(--bad)' },
      j.error) : null,
    el('div', { class: 'stats' },
      el('div', { class: 'stat' }, el('b', {}, pct + '%'), el('span', {}, 'complete')),
      el('div', { class: 'stat' }, el('b', {}, (j.done ?? 0) + '/' + (j.total ?? 0)), el('span', {}, 'items')),
      el('div', { class: 'stat' }, el('b', {}, j.started ? fmtT(Date.now() / 1000 - j.started) : '—'),
        el('span', {}, 'elapsed')),
      el('div', { class: 'stat' }, el('b', {}, busy && j.eta != null ? fmtT(j.eta) : '—'),
        el('span', {}, 'remaining')),
      el('div', { class: 'stat' },
        el('b', {}, j.rate ? (j.rate >= 1 ? j.rate.toFixed(1) + '/s' : (1 / j.rate).toFixed(1) + 's ea') : '—'),
        el('span', {}, 'rate'))),
    (j.steps || []).length ? el('div', { style: 'margin-top:16px' },
      el('div', { class: 'sub', style: 'margin-bottom:6px' }, 'Completed steps'),
      el('table', {}, el('tbody', {}, j.steps.map(s => el('tr', {},
        el('td', {}, el('b', {}, s.name), s.lang ? ' · ' + s.lang.toUpperCase() : ''),
        el('td', { class: 'mono sub' }, s.items ? s.items + ' items' : ''),
        el('td', { class: 'mono', style: 'text-align:right' }, fmtT(s.seconds)),
        el('td', { class: 'sub mono', style: 'text-align:right;width:92px' },
          s.items ? (s.seconds / s.items).toFixed(2) + 's ea' : '')))))) : null,
    (j.outputs || []).length ? el('div', { style: 'margin-top:16px' },
      el('div', { class: 'sub', style: 'margin-bottom:6px' }, 'Finished files'),
      el('div', { class: 'row' }, j.outputs.map(o => el('button', {
        class: 'btn sm', onclick: () => playVideo(o.name)
      }, `${o.name} · ${o.size_mb} MB`)))) : null);

  const t = $('#term'); if (!t) return;
  const near = t.scrollHeight - t.scrollTop - t.clientHeight < 60;
  t.innerHTML = '';
  for (const L of (j.log || [])) {
    const text = typeof L === 'string' ? L : L.text;
    const ts = typeof L === 'string' ? null : L.t;
    let cls = '';
    if (/^ERROR|Traceback|failed/i.test(text)) cls = 'e';
    else if (/WARNING|⚠/i.test(text)) cls = 'w';
    else if (/done|finished|ready/i.test(text)) cls = 'g';
    else if (/^\s{2,}/.test(text)) cls = 'd';
    t.append(el('div', { class: 'ln' },
      el('span', { class: 'ts' },
        ts ? new Date(ts * 1000).toLocaleTimeString([], { hour12: false }) : '--:--:--'),
      el('span', { class: cls }, text)));
  }
  if (follow && near) t.scrollTop = t.scrollHeight;
}

async function askDelete(id) {
  const d = await api('/api/deletable?id=' + encodeURIComponent(id));

  const confirmWrap = el('div', { style: 'display:none;margin-top:12px' },
    el('div', { class: 'sub', style: 'margin-bottom:5px;color:var(--bad)' },
      'This removes the scripts and translations. It cannot be undone.'),
    confirmBox);

  const go = el('button', { class: 'btn danger', disabled: true }, 'Delete');
  const sync = () => {
    const needsName = picked.has('sheets');
    confirmWrap.style.display = needsName ? '' : 'none';
    const total = [...picked].reduce((a, k) => a + (d.groups[k]?.mb || 0), 0);
    go.textContent = picked.size
      ? `Delete ${picked.size} group(s) · ${total.toFixed(1)} MB` : 'Delete';
    go.disabled = !picked.size || (needsName && confirmBox.value.trim() !== id);
  };
  confirmBox.addEventListener('input', sync);

  const rows = GROUPS.map(([key, title, note]) => {
    const g = d.groups[key] || { count: 0, mb: 0 };
    const box = el('input', {
      type: 'checkbox', disabled: !g.count,
      onchange: e => { e.target.checked ? picked.add(key) : picked.delete(key); sync(); }
    });
    return el('label', { class: 'dgroup', style: g.count ? '' : 'opacity:.45' },
      box,
      el('div', { class: 'what' },
        el('b', { style: key === 'sheets' ? 'color:var(--bad)' : '' }, title),
        el('div', { class: 'sub' }, note)),
      el('span', { class: 'sub mono' }, g.count ? `${g.count} · ${g.mb} MB` : 'none'));
  });

  const modal = el('div', { class: 'modal' },
    el('div', { class: 'box' },
      el('h3', {}, 'Delete from ' + id),
      el('div', { class: 'sub', style: 'margin-bottom:12px' },
        'Downloaded stock footage is never removed — it is shared between '
        + 'projects, so deleting it here would break others.'),
      el('div', {}, rows),
      confirmWrap,
      el('div', { class: 'row', style: 'margin-top:18px;justify-content:flex-end' },
        el('button', { class: 'btn', onclick: () => modal.remove() }, 'Cancel'),
        go)));

  go.onclick = async () => {
    go.disabled = true; go.textContent = 'Deleting…';
    const r = await api('/api/delete', {
      id, what: [...picked], confirm: confirmBox.value.trim()
    });
    modal.remove();
    if (r.error) return toast(r.error, true);
    toast(`Deleted ${r.count} file(s), freed ${r.freed_mb} MB.`);
    location.hash = picked.has('sheets') ? '#/dashboard' : '#/project/' + id;
    route();
  };
  document.body.append(modal);
  sync();
}

// ═══ router ═══════════════════════════════════════════════════════════════
const ROUTES = [
  [/^#\/dashboard$/, viewDashboard],
  [/^#\/project\/(.+)$/, viewProject],
  [/^#\/review\/(.+)$/, viewReview],
  [/^#\/run$/, viewRun],
  [/^#\/new$/, viewNew],
  [/^#\/voices/, viewVoices],
  [/^#\/settings$/, viewSettings],
];
async function route() {
  const h = location.hash || '#/dashboard';
  for (const [re, fn] of ROUTES) {
    const m = h.match(re);
    if (!m) continue;
    document.querySelectorAll('.nav').forEach(n => n.classList.toggle('on', h.startsWith(n.dataset.r)));
    try { await fn(m[1]); }
    catch (e) {
      $('#view').innerHTML = '';
      $('#view').append(el('div', { class: 'empty card' },
        el('b', {}, 'That view failed to load'),
        el('div', { class: 'mono sub' }, String(e && e.message || e))));
    }
    window.scrollTo(0, 0);
    return;
  }
  location.hash = '#/dashboard';
}
addEventListener('hashchange', route);
document.querySelectorAll('.nav').forEach(n => n.onclick = () => location.hash = n.dataset.r);

// ═══ polling ══════════════════════════════════════════════════════════════
let lastStage = null;
async function poll() {
  try {
    const j = await api('/api/status');
    S.status = j;
    const busy = BUSY.includes(j.stage);
    const badge = $('#navBadge');
    badge.style.display = busy ? '' : 'none';
    if (busy) badge.textContent = j.total ? Math.round(100 * j.done / j.total) + '%' : '···';

    if (location.hash === '#/run') paintRun();

    // A run just ended — refresh whatever is on screen so the status is honest.
    if (lastStage && lastStage !== j.stage && ['done', 'approve', 'error'].includes(j.stage)) {
      if (j.stage === 'done') toast('Finished.');
      if (j.stage === 'error') toast(j.error || 'Something failed — see Activity.', true);
      if (j.stage === 'approve') toast('Visuals ready to review.');
      if (location.hash === '#/dashboard' || location.hash.startsWith('#/project/')) route();
    }
    lastStage = j.stage;
  } catch (e) { /* server restarting — try again on the next tick */ }
  setTimeout(poll, 900);
}

route();
poll();
</script>
</html>
