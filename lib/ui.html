<link rel="preconnect" href="https://fonts.googleapis.com">

<!--
  The whole interface, in one file. No build step, no bundler, no node_modules —
  `faceless start` serves this directly.

  Views are real URLs via the History API — the server hands this page back
  for any non-asset path, so each of these can be typed, bookmarked, reloaded
  and shared, and Back/Forward behave normally:

     /                  every project, with per-language status
     /project/<id>      one project: visuals, per-language steps, actions
     /review/<id>       click the pictures that don't fit
     /activity          live terminal, exact counts, elapsed and remaining
     /new               paste a script, generate sheets
     /voices[/<lang>]   audition and choose reference clips
     /settings          machine check, keys, finished files

  One poll loop drives the whole app (900ms). It repaints the run view only when
  that view is open, but always keeps the sidebar badge current so you can walk
  away from a long build and still see it moving.
-->
<style>
/* ─── design tokens ──────────────────────────────────────────────────────────
   Steel-blue redesign (Faceless Studio.dc.html). The brand accent owns every
   interactive role; green / amber / red are reserved strictly for status. */
:root{
  --bg:#0a0b0e; --surface:#101216; --surface2:#161920; --surface3:#1d212a;
  --line:#242832; --line2:#333846;
  --ink:#eceef2; --ink2:#a2a9b6; --ink3:#727986;
  --accent:#6ea1ff; --accent-ink:#08122b; --accent-hi:#9dbcff;
  --ok:#43cf8e; --warn:#f5b13d; --bad:#f0716f;
  --term:#0a0c10; --term-ink:#c6cdd9;
  --shadow:0 12px 34px rgba(0,0,0,.35);
  --r:13px;
  --ui:'Geist',ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
/* A light set is kept so the toggle still works, derived from the same accent.
   The redesign is dark-first; this is a courtesy, not the reference. */
html[data-theme="light"]{
  --bg:#f5f6f8; --surface:#ffffff; --surface2:#f0f2f5; --surface3:#e7eaf0;
  --line:#e2e5ec; --line2:#cfd4de;
  --ink:#131722; --ink2:#535b6a; --ink3:#828a98;
  --accent:#3b6fe0; --accent-ink:#ffffff; --accent-hi:#2f5cc0;
  --ok:#1f9d63; --warn:#b9791b; --bad:#d05450;
  --term:#0e1116; --term-ink:#d6dce6;
  --shadow:0 12px 30px rgba(16,24,40,.10);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);
  font:15px/1.55 var(--ui);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hi)}
button,input,select,textarea{font-family:var(--ui);color:inherit}
h1,h2,h3{margin:0;font-weight:600;letter-spacing:-.02em}
h1{font-size:28px;letter-spacing:-.025em}
.mono,code{font-family:var(--mono)}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:9px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#39404e}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ─── shell ──────────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.side{background:var(--surface);border-right:1px solid var(--line);padding:22px 14px;
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:5px}
.brand{display:flex;align-items:center;gap:11px;padding:2px 8px 4px}
.dot{width:30px;height:30px;border-radius:8px;background:var(--accent);display:grid;
  place-items:center;color:var(--accent-ink);font-weight:700;font-size:16px;letter-spacing:-.03em}
.brand b{display:block;font-size:16px;font-weight:600;letter-spacing:-.02em;line-height:1.15}
.brand .st{font-size:11px;color:var(--ink3);font-family:var(--mono);letter-spacing:.02em}
.newbtn{margin:12px 4px 16px;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--accent);border:1px solid var(--accent);color:var(--accent-ink);
  padding:10px 14px;border-radius:9px;cursor:pointer;font:600 14px var(--ui);transition:.12s}
.newbtn:hover{filter:brightness(1.07)}
.seclabel{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);
  padding:0 12px 8px;font-weight:600}
.nav{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
  color:var(--ink2);cursor:pointer;border:1px solid transparent;font:500 14px var(--ui)}
.nav svg{width:17px;height:17px;flex:none;opacity:.9}
.nav:hover{background:var(--surface2);color:var(--ink)}
.nav.on{background:var(--surface3);color:var(--ink);border-color:var(--line)}
.badge{margin-left:auto;font-size:12px;font-family:var(--mono);background:var(--accent);
  color:var(--accent-ink);padding:1px 7px;border-radius:99px;font-weight:600}
.foot{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding:12px 12px 4px;
  border-top:1px solid var(--line)}
.foot .live{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2)}
.foot .live .dotlive{width:7px;height:7px;border-radius:99px;background:var(--ok);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 18%,transparent);animation:pulse 2.4s ease-in-out infinite}
.foot .addr{font-size:12px;color:var(--ink3);font-family:var(--mono)}
.foot .btn{align-self:flex-start}
.main{padding:34px 30px 80px;max-width:1560px;width:100%;min-width:0}

/* ─── headings & links ───────────────────────────────────────────────────── */
.head{display:flex;align-items:flex-start;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.head .grow{flex:1;min-width:220px}
.head p,.head .sub{margin:7px 0 0;color:var(--ink2);font-size:14.5px}
.eyebrow{font-family:var(--mono);font-size:13px;color:var(--ink3);margin-bottom:4px}
.back{display:inline-flex;align-items:center;gap:6px;cursor:pointer;color:var(--ink3);
  font-size:13px;margin-bottom:8px}
.back:hover{color:var(--ink)}
.back svg{width:14px;height:14px}

/* ─── controls ───────────────────────────────────────────────────────────── */
.btn{background:var(--surface2);border:1px solid var(--line);color:var(--ink);
  padding:9px 15px;border-radius:9px;cursor:pointer;font:500 14px var(--ui);
  transition:.12s;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
.btn:hover:not(:disabled){border-color:var(--line2)}
.btn:disabled{opacity:.42;cursor:not-allowed}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-ink);font-weight:600}
.btn.primary:hover:not(:disabled){filter:brightness(1.07);border-color:var(--accent)}
.btn.sm{padding:6px 12px;font-size:13px;border-radius:8px}
.btn.danger{background:transparent;color:var(--bad);
  border-color:color-mix(in srgb,var(--bad) 32%,var(--line))}
.btn.danger:hover:not(:disabled){background:color-mix(in srgb,var(--bad) 10%,transparent);border-color:color-mix(in srgb,var(--bad) 42%,var(--line))}
.btn svg{width:14px;height:14px}
input[type=text],input[type=search],select,textarea{background:var(--bg);border:1px solid var(--line);
  color:var(--ink);border-radius:9px;padding:10px 12px;width:100%;font-size:14.5px}
textarea{font-family:var(--mono);font-size:14px;line-height:1.6;resize:vertical}
input:focus,select:focus,textarea:focus{
  outline:2px solid color-mix(in srgb,var(--accent) 45%,transparent);outline-offset:-1px}
label.chk{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13.5px;color:var(--ink2)}
label.chk input{accent-color:var(--accent);width:15px;height:15px}
input[type=range]{accent-color:var(--accent)}

/* ─── cards ──────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:18px}
.card h3{font-size:17.5px;font-weight:600;letter-spacing:-.015em;line-height:1.3}
.sub{color:var(--ink3);font-size:12.5px}
.card.click{cursor:pointer;transition:.14s ease}
.card.click:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}

/* ─── status pills ───────────────────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;gap:6px;font:600 12px var(--ui);
  padding:3px 10px;border-radius:99px;border:1px solid;line-height:1.5;white-space:nowrap}
.pill::before{content:"";width:6px;height:6px;border-radius:99px;background:currentColor}
.pill.plain::before{display:none}
.pill.ok{color:var(--ok);border-color:color-mix(in srgb,var(--ok) 34%,transparent);
  background:color-mix(in srgb,var(--ok) 12%,transparent)}
.pill.part{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 34%,transparent);
  background:color-mix(in srgb,var(--warn) 12%,transparent)}
.pill.bad{color:var(--bad);border-color:color-mix(in srgb,var(--bad) 34%,transparent);
  background:color-mix(in srgb,var(--bad) 12%,transparent)}
.pill.none{color:var(--ink3);border-color:var(--line);background:var(--surface2)}

/* ─── per-language rows & step bars ──────────────────────────────────────── */
.langrow{display:flex;align-items:center;gap:12px;padding:0}
.lang{width:26px;font-family:var(--mono);font-weight:600;font-size:12px;color:var(--ink2);
  text-transform:uppercase;flex:none}
.steps{display:flex;gap:4px;flex:1}
.step{flex:1;height:6px;border-radius:3px;background:var(--surface3)}
.step.done{background:var(--ok)}
.step.part{background:linear-gradient(90deg,var(--warn) var(--p,50%),var(--surface3) var(--p,50%))}
.steplabels{display:flex;gap:4px;margin-top:4px}
.steplabels span{flex:1;font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}

/* ─── section hairline header ────────────────────────────────────────────── */
.sec{display:flex;align-items:center;gap:14px;margin:0 0 14px}
.sec h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);font-weight:600}
.sec .note{font-size:13px;color:var(--ink3)}
.sec::after{content:"";flex:1;height:1px;background:var(--line)}
.sec.mt{margin-top:30px}

/* ─── tables ─────────────────────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--ink3);font-weight:600;padding:0 12px 10px}
td{padding:12px;border-top:1px solid var(--line);vertical-align:middle}

/* ─── project languages grid-table ──────────────────────────────────────── */
.ltable{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.ltable .lhead,.ltable .lrow{display:grid;
  grid-template-columns:1.3fr 1.5fr 1.4fr 1fr 1.6fr auto;gap:12px;padding:14px 18px;
  border-bottom:1px solid var(--line);align-items:center}
.ltable .lhead{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:600}
.ltable .lname{font-weight:600;font-size:14.5px}
.ltable .lcode{font-family:var(--mono);font-size:12px;color:var(--ink3)}
.ltable .lfoot{display:flex;align-items:center;gap:18px;padding:16px 18px;flex-wrap:wrap}
.link{color:var(--accent);cursor:pointer;font-size:12.5px}
.link:hover{color:var(--accent-hi)}

/* ─── terminal ───────────────────────────────────────────────────────────── */
.term{background:var(--term);border:1px solid var(--line);border-radius:12px;
  font-family:var(--mono);font-size:13px;line-height:1.7;padding:14px 16px;height:340px;
  overflow:auto;color:var(--term-ink)}
.term .ln{display:flex;gap:12px;white-space:pre-wrap;word-break:break-word}
.term .ts{color:#454b57;flex:none;-webkit-user-select:none;user-select:none}
.term .e{color:var(--bad)}.term .w{color:var(--warn)}.term .g{color:var(--ok)}.term .d{color:var(--ink3)}
.termbar{display:flex;align-items:center;gap:12px;margin-bottom:10px}

/* ─── progress & stat strip ──────────────────────────────────────────────── */
.bar{height:9px;background:var(--surface3);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar i{display:block;height:100%;background:var(--accent);transition:width .3s ease}
.bar.idle i{background:var(--ink3)}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-top:16px}
.stat{background:var(--surface);padding:14px 16px}
.stat b{display:block;font-size:22px;font-weight:600;letter-spacing:-.02em;
  font-family:var(--mono);font-variant-numeric:tabular-nums}
.stat span{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}

/* ─── misc ───────────────────────────────────────────────────────────────── */
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.empty{text-align:center;padding:60px 20px;color:var(--ink2)}
.empty b{display:block;font-size:16px;color:var(--ink);margin-bottom:6px}
.hr{height:1px;background:var(--line);margin:22px 0}
.thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:11px}
.thumb{position:relative;aspect-ratio:16/9;border-radius:8px;overflow:hidden;
  background:var(--surface3);border:2px solid transparent;cursor:pointer}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
.thumb.rej{border-color:var(--bad);opacity:.5}
.thumb.hero{border-color:var(--accent)}
.thumb .n{position:absolute;left:0;top:0;background:rgba(0,0,0,.72);color:#fff;
  font-family:var(--mono);font-size:11.5px;padding:2px 7px;border-radius:0 0 6px 0;font-weight:600}
.thumb .rep{position:absolute;inset:0;display:grid;place-items:center;
  background:color-mix(in srgb,var(--bad) 28%,transparent)}
.thumb .rep span{background:var(--bad);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px}

/* ─── running banner ─────────────────────────────────────────────────────── */
#banner{display:flex;align-items:center;gap:14px;margin-bottom:26px;padding:12px 16px;
  border-radius:11px;background:color-mix(in srgb,var(--accent) 10%,var(--surface));
  border:1px solid color-mix(in srgb,var(--accent) 34%,var(--line));font-size:13.5px}
#banner.err{background:color-mix(in srgb,var(--bad) 10%,var(--surface));
  border-color:color-mix(in srgb,var(--bad) 40%,var(--line))}
#banner b{font-family:var(--mono);font-size:13.5px}
#banner .bar{flex:1;max-width:260px;height:7px}

/* ─── toast, modal, spinner ──────────────────────────────────────────────── */
.toast{position:fixed;right:18px;bottom:18px;background:var(--surface);border:1px solid var(--line);
  border-left:3px solid var(--accent);padding:12px 15px;border-radius:10px;
  box-shadow:var(--shadow);z-index:50;max-width:360px;font-size:13.5px}
.toast.err{border-left-color:var(--bad)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:grid;place-items:center;
  z-index:60;padding:20px}
.modal .box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:22px;max-width:540px;width:100%;box-shadow:var(--shadow)}
.modal h3{font-size:17px;margin-bottom:6px}
.dgroup{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
.dgroup:first-of-type{border-top:0}
.dgroup .what{flex:1}
.dgroup .what b{font-size:13.5px}
.spin{display:inline-block;width:13px;height:13px;flex:none;
  border:2px solid color-mix(in srgb,var(--accent) 30%,transparent);
  border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}

/* ─── responsive ─────────────────────────────────────────────────────────── */
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .side{position:static;height:auto}
  .stats{grid-template-columns:repeat(2,1fr)}
  .ltable .lhead{display:none}
  .ltable .lrow{grid-template-columns:1fr 1fr;gap:10px}
  .main{padding:22px 16px 60px}
}
</style>

<div class="app">
  <aside class="side">
    <div class="brand">
      <span class="dot">F</span>
      <span><b>Faceless</b><span class="st">STUDIO</span></span>
    </div>
    <button class="newbtn" data-r="/new" type="button">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      New video
    </button>
    <div class="seclabel">Workspace</div>
    <a class="nav" data-r="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      Dashboard
    </a>
    <a class="nav" data-r="/activity">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2.5 7 5-16L17 12h4"/></svg>
      Activity<span class="badge" id="navBadge" style="display:none"></span>
    </a>
    <a class="nav" data-r="/voices">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M4 10v4M8 6v12M12 3v18M16 7v10M20 10v4"/></svg>

    </a>
    <a class="nav" data-r="/settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9L17 7M7 17l-2.1 2.1"/></svg>
      Settings
    </a>
    <div class="foot">
      <div class="live"><span class="dotlive"></span><span>Server running</span></div>

<script>
// ═══ tiny helpers ═════════════════════════════════════════════════════════
const $ = s => document.querySelector(s);
const el = (t, a = {}, ...kids) => {
  const n = document.createElement(t);
  for (const [k, v] of Object.entries(a)) {
    if (v === null || v === undefined || v === false) continue;
    if (k === 'class') n.className = v;
    else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
    else if (k === 'checked' || k === 'selected' || k === 'muted') n[k] = !!v;
    else n.setAttribute(k, v);
  }
  for (const c of kids.flat(3)) {
    if (c === null || c === undefined || c === false) continue;
    n.append(c.nodeType ? c : document.createTextNode(c));
  }
  return n;
};
async function api(ep, body) {
  const r = await fetch(ep, body ? {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  } : {});
  const j = await r.json().catch(() => ({ error: 'the server sent something unreadable' }));
  if (j.error && body) {
    toast(j.error, true);
    // "Something is already running" is not much use on its own — show the
    // person the thing that is running.
    if (r.status === 409) go('/activity');
  }
  return j;
}
let toastT;
function toast(msg, bad) {
  clearTimeout(toastT);
  $('#toast').innerHTML = '';
  const n = el('div', { class: 'toast' }, msg);
  if (bad) n.style.borderLeftColor = 'var(--bad)';
  $('#toast').append(n);
  toastT = setTimeout(() => n.remove(), 5200);
}
const fmtT = s => {
  s = Math.max(0, Math.round(s || 0));
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60);
  return m < 60 ? `${m}m ${String(s % 60).padStart(2, '0')}s`
                : `${Math.floor(m / 60)}h ${String(m % 60).padStart(2, '0')}m`;
};
const ago = ts => {
  if (!ts) return '';
  const d = (Date.now() / 1000) - ts;
  if (d < 90) return 'just now';
  if (d < 3600) return Math.round(d / 60) + ' min ago';
  if (d < 86400) return Math.round(d / 3600) + ' h ago';
  return Math.round(d / 86400) + ' d ago';
};

// ═══ theme ════════════════════════════════════════════════════════════════
// localStorage is correct here: this page is served from your own machine and
// the choice should survive a restart.
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  $('#themeBtn').textContent = t === 'light' ? 'Dark mode' : 'Light mode';
  try { localStorage.setItem('faceless.theme', t); } catch (e) { }
}
let _t = 'dark';
try { _t = localStorage.getItem('faceless.theme') || 'dark'; } catch (e) { }
applyTheme(_t);
$('#themeBtn').onclick = () =>

// ═══ shared state ═════════════════════════════════════════════════════════
const S = { projects: [], music: [], status: {}, meta: {} };

// ═══ status maths ═════════════════════════════════════════════════════════
const STEPS = ['sheets', 'visuals', 'voice', 'render'];
function fractions(st, l) {
  const n = st.scenes || 0;
  return {
    sheets: l.sheets ? 1 : 0,
    visuals: n ? Math.min(1, (st.assets || 0) / n) : 0,
    voice: n ? Math.min(1, (l.voice_n || 0) / n) : 0,
    render: l.render ? 1 : 0,
  };
}
function overall(st) {
  const ls = Object.values(st.languages || {});
  if (!ls.length) return { cls: 'none', text: 'empty' };
  const done = ls.filter(l => l.render).length;
  if (done === ls.length) return { cls: 'ok', text: 'complete' };
  if (done > 0) return { cls: 'part', text: `${done}/${ls.length} rendered` };
  if (ls.some(l => l.voice_n > 0) || st.assets > 0) return { cls: 'part', text: 'in progress' };
  return { cls: 'none', text: 'not started' };
}
function stepBar(st, l) {
  const f = fractions(st, l);
  return el('div', {},
    el('div', { class: 'steps' }, STEPS.map(k => {
      const v = f[k];
      const d = el('div', { class: 'step ' + (v >= 1 ? 'done' : v > 0 ? 'part' : '') });
      if (v > 0 && v < 1) d.style.setProperty('--p', Math.round(v * 100) + '%');
      return d;
    })),
    el('div', { class: 'steplabels' }, STEPS.map(k => el('span', {}, k))));
}

              l.render ? l.size_mb + ' MB' : `${l.voice_n || 0}/${st.scenes}`)))),

async function viewProject(id) {

  if (!p) { v.append(el('div', { class: 'empty card' }, el('b', {}, 'No such project'), id)); return; }

  const o = overall(st);

  v.append(el('div', { class: 'head' },
    el('div', { class: 'grow' },
      el('div', { class: 'back', onclick: () => go('/dashboard') }, '← Dashboard'),
      el('h1', { style: 'margin-top:4px' }, p.id),

      el('span', { class: 'pill ' + o.cls }, o.text),

  // visuals ---------------------------------------------------------------
  const sourced = st.assets >= st.scenes && st.scenes > 0;
  v.append(el('div', { class: 'sec' }, el('h2', {}, 'Visuals'),
    el('span', { class: 'sub' }, 'sourced once, shared by every language')));
  v.append(el('div', { class: 'card', style: 'margin-bottom:22px' },
    el('div', { class: 'row' },
      el('button', {
        class: 'btn' + (st.assets ? '' : ' primary'),
        onclick: async e => {
          e.target.disabled = true;
          const r = await api('/api/source', { id: p.id });
          if (r.started) go('/activity'); else e.target.disabled = false;
        }
      }, st.assets ? 'Re-source all' : 'Find visuals'),
      st.assets ? el('button', { class: 'btn', onclick: () => go('/review/' + p.id) },
        'Review & swap pictures') : null,
      el('div', { style: 'flex:1' }),
      el('span', { class: 'pill ' + (sourced ? 'ok' : st.assets ? 'part' : 'none') },
        `${st.assets} / ${st.scenes}`))));

  // languages -------------------------------------------------------------
  const opts = { captions: true, zoom: true, music: '' };
  const run = async (langs, steps, force) => {
    const r = await api('/api/run', {
      id: p.id, langs, steps, force,
      captions: opts.captions, zoom: opts.zoom, music: opts.music || null
    });
    if (r.started) go('/activity');
  };

  // Report the voice; don't offer a second way to set it. Choosing happens in
  // the Voices panel, where you can hear a clip before committing to it — the
  // decision needs listening, and a dropdown here invited choosing blind.
  const voiceCell = (code, l) => {
    if (!l.voice_ref) {
      return el('div', {},
        el('span', { class: 'pill bad' }, 'not set'),
        el('div', { class: 'sub', style: 'margin-top:4px' },
          el('span', {

            onclick: () => go('/voices/' + code)
          }, 'choose a voice')));
    }
    return el('div', {},
      el('b', { style: 'font-size:14.8px' }, l.voice_label),
      el('div', { class: 'sub', style: 'margin-top:2px' },
        el('span', {
          style: 'color:var(--accent);cursor:pointer',
          onclick: () => go('/voices/' + code)
        }, 'change')));
  };

  v.append(el('div', { class: 'sec' }, el('h2', {}, 'Languages'),
    el('span', { class: 'sub' }, 'each language has its own voice')));
  v.append(el('div', { class: 'card' },
    el('table', {},
      el('thead', {}, el('tr', {},
        ['Language', 'Voice', 'Progress', 'Narration', 'Video', ''].map(h => el('th', {}, h)))),
      el('tbody', {}, Object.entries(st.languages || {}).map(([code, l]) => el('tr', {},
        el('td', {}, el('b', {}, l.name || code), el('div', { class: 'sub mono' }, code)),
        el('td', {}, voiceCell(code, l)),
        el('td', { style: 'width:180px' }, stepBar(st, l)),
        el('td', {}, l.voice ? el('span', { class: 'pill ok' }, 'complete')
          : l.voice_n ? el('span', { class: 'pill part' }, `${l.voice_n} / ${st.scenes}`)
            : el('span', { class: 'pill none' },
              l.voice_ref ? 'none yet' : 'no voice set')),
        el('td', {}, l.render
          ? el('div', {}, el('div', { class: 'mono', style: 'font-size:14.2px' }, l.mp4),
            el('div', { class: 'sub' }, `${l.size_mb} MB · ${ago(l.built)}`))
          : el('span', { class: 'sub' }, '—')),
        el('td', { style: 'text-align:right' },
          el('div', { class: 'row', style: 'justify-content:flex-end;gap:6px' },
            l.render ? el('button', {
              class: 'btn sm',
              onclick: () => playVideo(l.mp4, p.id + ' · ' + (l.name || code))

            el('button', {
              class: 'btn sm', disabled: !l.voice_ref,

              onclick: () => run([code], ['voice'], false)
            }, l.voice ? 'Re-check' : l.voice_n ? 'Resume' : 'Voice'),
            l.voice_n ? el('button', {

            }, 'Redo') : null,
            el('button', {
              class: 'btn sm' + (l.voice && !l.render ? ' primary' : ''),

      el('select', { style: 'width:auto;min-width:140px', onchange: e => opts.music = e.target.value },
        el('option', { value: '' }, 'None'), S.music.map(m => el('option', { value: m }, m))),
      el('button', {

function viewRun() {
  const v = $('#view'); v.innerHTML = '';

    el('div', { class: 'grow' }, el('h1', {}, 'Activity'), el('p', { id: 'runSub' }, ''))));

          navigator.clipboard?.writeText(t);
          toast('Log copied to the clipboard.');
        }
      }, 'Copy'),

        class: 'btn sm danger', id: 'stopBtn',
        onclick: async e => { e.target.disabled = true; await api('/api/cancel', {}); }
      }, 'Stop')),
    el('div', { class: 'term', id: 'term' })));
  paintRun();

const BUSY = ['generate', 'stock', 'voice', 'render'];
function paintRun() {
  const j = S.status || {};
  const card = $('#runCard'); if (!card) return;
  const busy = BUSY.includes(j.stage);
  const pct = j.total ? Math.round(100 * j.done / j.total) : 0;

  const sub = $('#runSub');
  if (sub) sub.textContent = busy ? `${j.project || ''} · ${j.label || j.stage}`
    : j.stage === 'error' ? 'Stopped with an error.'
      : j.stage === 'done' ? 'Finished.'
        : j.stage === 'approve' ? 'Visuals ready to review.' : 'Nothing running.';

  card.innerHTML = '';
  // Native .append() — unlike the el() helper — turns a null argument into the
  // literal text "null". With an error showing but no steps and no outputs, the
  // two trailing nulls rendered as "nullnull" under the stats. Filter them out.
  card.append(...[
    el('div', { class: 'row', style: 'margin-bottom:10px' },
      busy ? el('span', { class: 'spin' }) : null,
      el('b', {}, busy ? (j.label || j.stage)
        : j.stage === 'error' ? 'Error' : j.stage === 'done' ? 'Done' : 'Idle'),
      el('div', { style: 'flex:1' }),
      el('span', { class: 'mono sub' }, j.total ? `${j.done} / ${j.total}` : '')),
    el('div', { class: 'bar' + (busy ? '' : ' idle') }, el('i', { style: `width:${pct}%` })),
    j.error ? el('div', { class: 'card', style: 'margin-top:12px;border-color:var(--bad);color:var(--bad)' },
      j.error) : null,
    el('div', { class: 'stats' },
      el('div', { class: 'stat' }, el('b', {}, pct + '%'), el('span', {}, 'complete')),
      el('div', { class: 'stat' }, el('b', {}, (j.done ?? 0) + '/' + (j.total ?? 0)), el('span', {}, 'items')),
      el('div', { class: 'stat' }, el('b', {}, j.started ? fmtT(Date.now() / 1000 - j.started) : '—'),
        el('span', {}, 'elapsed')),
      el('div', { class: 'stat' }, el('b', {}, busy && j.eta != null ? fmtT(j.eta) : '—'),
        el('span', {}, 'remaining')),
      el('div', { class: 'stat' },
        el('b', {}, j.rate ? (j.rate >= 1 ? j.rate.toFixed(1) + '/s' : (1 / j.rate).toFixed(1) + 's ea') : '—'),
        el('span', {}, 'rate'))),
    (j.steps || []).length ? el('div', { style: 'margin-top:16px' },
      el('div', { class: 'sub', style: 'margin-bottom:6px' }, 'Completed steps'),
      el('table', {}, el('tbody', {}, j.steps.map(s => el('tr', {},
        el('td', {}, el('b', {}, s.name), s.lang ? ' · ' + s.lang.toUpperCase() : ''),
        el('td', { class: 'mono sub' }, s.items ? s.items + ' items' : ''),
        el('td', { class: 'mono', style: 'text-align:right' }, fmtT(s.seconds)),
        el('td', { class: 'sub mono', style: 'text-align:right;width:92px' },
          s.items ? (s.seconds / s.items).toFixed(2) + 's ea' : '')))))) : null,
    (j.outputs || []).length ? el('div', { style: 'margin-top:16px' },
      el('div', { class: 'sub', style: 'margin-bottom:6px' }, 'Finished files'),
      el('div', { class: 'row' }, j.outputs.map(o => el('button', {
        class: 'btn sm', onclick: () => playVideo(o.name)
      }, `${o.name} · ${o.size_mb} MB`)))) : null,
  ].filter(Boolean));

  const t = $('#term'); if (!t) return;
  const near = t.scrollHeight - t.scrollTop - t.clientHeight < 60;
  t.innerHTML = '';
  for (const L of (j.log || [])) {
    const text = typeof L === 'string' ? L : L.text;
    const ts = typeof L === 'string' ? null : L.t;
    let cls = '';
    if (/^ERROR|Traceback|failed/i.test(text)) cls = 'e';
    else if (/WARNING|⚠/i.test(text)) cls = 'w';
    else if (/done|finished|ready/i.test(text)) cls = 'g';
    else if (/^\s{2,}/.test(text)) cls = 'd';
    t.append(el('div', { class: 'ln' },
      el('span', { class: 'ts' },
        ts ? new Date(ts * 1000).toLocaleTimeString([], { hour12: false }) : '--:--:--'),
      el('span', { class: cls }, text)));
  }
  if (follow && near) t.scrollTop = t.scrollHeight;
}

// ═══ voices ═══════════════════════════════════════════════════════════════
async function viewVoices(lang) {
  lang = lang || 'en';
  const d = await api('/api/voices?lang=' + lang);
  const v = $('#view'); v.innerHTML = '';
  const chosenRel = (d.chosen || {}).reference || '';
  // A saved choice may be a bare filename from an older version; match on the
  // filename so the right card still shows as in use.
  const isChosen = r => r.rel === chosenRel
    || r.name === String(chosenRel).split('/').pop();

  v.append(el('div', { class: 'head' }, el('div', { class: 'grow' },
    el('h1', {}, 'Voices'),
    el('p', {}, 'Narration is cloned from a reference clip. Each language has its '
      + 'own folder and its own choice.'))));

  if (d.status && !d.status.installed) v.append(el('div', {
    class: 'card', style: 'border-color:var(--bad);margin-bottom:14px'
  }, el('b', {}, 'The voice engine is not installed. '), 'Run setup, then reload.'));

  // ── language tabs, with a count each ────────────────────────────────────
  const tabs = el('div', { class: 'row', style: 'gap:6px' },
    Object.entries(d.counts || {}).map(([code, n]) =>
      el('button', {
        class: 'btn sm' + (code === lang ? ' primary' : ''),
        onclick: () => go('/voices/' + code)
      }, `${d.languages[code] || code}`,
        el('span', { class: 'sub', style: 'margin-left:6px;opacity:.75' }, `${n}`))),
    el('select', {
      style: 'width:auto;min-width:150px;margin-left:6px',
      onchange: e => e.target.value && go('/voices/' + e.target.value)
    }, el('option', { value: '' }, 'Other language…'),
      Object.entries(d.languages || {})
        .filter(([c]) => !(c in (d.counts || {})))
        .map(([c, n]) => el('option', { value: c, selected: c === lang }, n))));

  v.append(el('div', { class: 'card', style: 'margin-bottom:14px' },
    el('div', { class: 'row' }, tabs,
      el('div', { style: 'flex:1' }),
      chosenRel
        ? el('span', { class: 'pill ok' }, 'Using: ' + (d.status.reference_label || chosenRel))
        : el('span', { class: 'pill none' }, 'no clip chosen'))));

  const tune = {
    exag: (d.chosen || {}).exaggeration ?? 0.4,
    cfg: (d.chosen || {}).cfg_weight ?? 0.5
  };

  // ── one card per clip ───────────────────────────────────────────────────
  const voiceCard = r => {
    const preview = el('button', {
      class: 'btn sm',
      onclick: async e => {
        const b = e.target;
        b.textContent = 'Generating…'; b.disabled = true;
        const j = await api('/api/preview', {
          lang, reference: r.rel, text: d.sample,
          exaggeration: tune.exag, cfg_weight: tune.cfg
        });
        b.textContent = 'Preview'; b.disabled = false;
        if (j.url) new Audio(j.url + '?t=' + Date.now()).play();
      }
    }, 'Preview');

    const choose = el('button', {
      class: 'btn sm' + (isChosen(r) ? '' : ' primary'),
      onclick: async () => {
        await api('/api/choose_voice', {
          lang, reference: r.rel,
          exaggeration: tune.exag, cfg_weight: tune.cfg
        });
        toast(`${r.label} will now read ${d.lang_name}.`);
        viewVoices(lang);
      }
    }, isChosen(r) ? 'Save these settings' : 'Use this');

    return el('div', { class: 'card' },
      el('div', { class: 'row', style: 'justify-content:space-between;align-items:flex-start' },
        el('div', { style: 'min-width:0' },
          el('h3', {}, r.label),
          el('div', { class: 'sub mono' }, r.rel),
          el('div', { class: 'sub' }, `${r.seconds}s`
            + (r.short ? ' · under 8s, clones poorly' : '')
            + (r.lang ? '' : ' · not in a language folder'))),
        isChosen(r) ? el('span', { class: 'pill ok' }, 'in use') : null),
      el('div', { class: 'row', style: 'margin-top:12px' }, preview, choose));
  };

  const mine = d.references || [];
  const loose = d.loose || [];

  if (!mine.length && !loose.length) {
    v.append(el('div', { class: 'empty card' },
      el('b', {}, `No clips for ${d.lang_name} yet`),
      el('div', {}, 'Put one or more audio files in this folder, then reload:'),
      el('div', { class: 'mono', style: 'margin:10px 0;font-size:15.3px;color:var(--accent)' },
        d.folder + '/'),
      el('div', { class: 'sub' },
        'Thirty seconds of clean, continuous speech clones far better than ten. '
        + 'One speaker, no music. It must be audio you hold rights to.')));
  } else {
    v.append(el('div', { class: 'sec' },
      el('h2', {}, `${d.lang_name} clips`),
      el('span', { class: 'sub mono' }, d.folder + '/')));
    v.append(el('div', { class: 'cards' }, mine.map(voiceCard)));
  }

  if (loose.length) {
    v.append(el('div', { class: 'sec', style: 'margin-top:22px' },
      el('h2', {}, 'Not sorted yet'),
      el('span', { class: 'sub' },
        'loose in voices_refs/ — offered for every language'),
      el('div', { style: 'flex:1' }),
      el('button', {
        class: 'btn sm', onclick: async () => {
          const r = await api('/api/organise_voices', {});
          toast(r.count ? `Moved ${r.count} file(s) into language folders.`
            : 'Nothing could be placed automatically — move those by hand.');
          viewVoices(lang);
        }
      }, 'Sort into language folders')));
    v.append(el('div', { class: 'cards' }, loose.map(voiceCard)));
  }

  // ── tuning ──────────────────────────────────────────────────────────────
  const slider = (label, key, note) => {
    const out = el('b', { class: 'mono' }, tune[key].toFixed(2));
    return el('div', {},
      el('div', { class: 'row' }, el('span', { class: 'sub', style: 'flex:1' }, label), out),
      el('input', {
        type: 'range', min: 0, max: 1, step: 0.05, value: tune[key],
        style: 'width:100%;accent-color:var(--accent)',
        oninput: e => { tune[key] = +e.target.value; out.textContent = tune[key].toFixed(2); }
      }),
      el('div', { class: 'sub' }, note));
  };
  if (mine.length || loose.length) {
    v.append(el('div', { class: 'card', style: 'margin-top:22px' },
      el('div', { class: 'grid2' },
        slider('Expression', 'exag', 'Low is calm and even. 0.40 suits documentary narration.'),
        slider('Guidance', 'cfg', 'How closely it copies the reference. 0.50 is a good start.')),
      el('div', { class: 'sub', style: 'margin-top:12px' },
        'Preview first, then Use this — the settings are saved with the clip.')));
  }

  // ── how to add more ─────────────────────────────────────────────────────
  // Built from named pieces. Nesting el() four deep in one expression is how
  // I miscounted brackets twice; this reads better and cannot go wrong.
  const step1 = el('li', {}, 'Put the audio file in ',
    el('code', { style: 'color:var(--accent)' }, d.folder + '/'));
  const step2 = el('li', {}, 'Name it for how it sounds — ',
    el('code', {}, 'warm-documentary-male.mp3'),
    ' shows as "Warm documentary male"');
  const step3 = el('li', {}, 'Reload this page, Preview it, then Use this');
  const step4 = el('li', {}, 'Re-voice any language whose clip you changed — '
    + 'narration already generated stays cached under the previous voice');
  const steps = el('ol', {
    class: 'sub',
    style: 'margin:8px 0 0;padding-left:18px;line-height:1.9'
  }, step1, step2, step3, step4);

  v.append(el('div', { class: 'card', style: 'margin-top:22px' },
    el('h3', {}, 'Adding a voice'), steps));
}

// ═══ settings ═════════════════════════════════════════════════════════════
async function viewSettings() {
  const v = $('#view'); v.innerHTML = '';
  const header = () => el('div', { class: 'head' }, el('div', { class: 'grow' },
    el('h1', {}, 'Settings'),
    el('p', {}, 'The same checks that `faceless check` runs in the terminal.')));
  v.append(header(), el('div', { class: 'card' }, el('span', { class: 'spin' }), ' Checking…'));

  const d = await api('/api/doctor');
  v.innerHTML = ''; v.append(header());

  const line = (ok, label, detail, hint) => el('tr', {},
    el('td', { style: 'width:44px' },
      el('span', { class: 'pill ' + (ok === null ? 'none' : ok ? 'ok' : 'bad') },
        ok === null ? '–' : ok ? 'ok' : '!!')),
    el('td', {}, el('b', {}, label),
      (!ok && hint) ? el('div', { class: 'sub mono', style: 'margin-top:2px' }, hint) : null),
    el('td', { class: 'mono sub', style: 'text-align:right' }, detail));

  const dev = d.device || {};
  v.append(el('div', { class: 'sec' }, el('h2', {}, 'This machine')));
  v.append(el('div', { class: 'card' }, el('table', {}, el('tbody', {},
    line(true, 'Python', d.python),
    line(d.in_venv, 'Environment', d.in_venv ? 'project .venv' : 'system Python',
      'run setup.sh (macOS) or setup.bat (Windows)'),
    line(!!d.ffmpeg, 'ffmpeg', d.ffmpeg ? 'found' : 'NOT FOUND', d.ffmpeg_hint),
    line(d.captions_ok, 'Captions', d.captions, d.ffmpeg_hint),
    line(d.chatterbox, 'Voice engine', d.chatterbox ? 'installed' : 'missing',
      'run setup.sh / setup.bat'),
    line(d.chatterbox ? d.gpu_ok : null, 'GPU',
      dev.name ? dev.name + (dev.vram_gb ? ' · ' + dev.vram_gb + ' GB' : '') : 'none',
      'PyTorch has no CUDA build — see README section 6'),
    dev.note ? el('tr', {}, el('td', {}),
      el('td', { class: 'sub', colspan: '2' }, dev.note)) : null))));

  v.append(el('div', { class: 'sec', style: 'margin-top:22px' }, el('h2', {}, 'API keys')));
  v.append(el('div', { class: 'card' }, el('table', {}, el('tbody', {},
    line(d.keys.pexels, 'Pexels', d.keys.pexels ? 'set' : 'missing', 'pexels.com/api'),
    line(d.keys.pixabay, 'Pixabay', d.keys.pixabay ? 'set' : 'missing', 'pixabay.com/api/docs'),
    line(d.keys.gemini, 'Gemini (optional)', d.keys.gemini ? 'set' : 'not set',
      'aistudio.google.com/apikey'))),
    el('div', { class: 'sub', style: 'margin-top:10px' },
      'Keys live in config.json. Edit that file in a plain text editor, then reload this page.')));

  v.append(el('div', { class: 'sec', style: 'margin-top:22px' }, el('h2', {}, 'Chosen voices')));
  v.append(el('div', { class: 'card' }, el('table', {}, el('tbody', {},
    Object.entries(d.voices || {}).map(([lg, s]) =>
      line(!!s.reference_ok, lg.toUpperCase(), s.reference || 'none chosen',
        'pick one in the Voices panel')))),
    el('div', { class: 'row', style: 'margin-top:12px' },
      el('button', { class: 'btn sm', onclick: () => go('/voices') }, 'Open Voices'))));

  v.append(el('div', { class: 'sec', style: 'margin-top:22px' }, el('h2', {}, 'Finished files'),
    el('span', { class: 'sub' }, `${(d.outputs || []).length} in out/`)));
  v.append(el('div', { class: 'card' }, (d.outputs || []).length
    ? el('table', {}, el('tbody', {}, d.outputs.map(o => el('tr', {},
      el('td', { class: 'mono' }, o.name),
      el('td', { class: 'sub', style: 'text-align:right' }, o.size_mb + ' MB'),
      el('td', { class: 'sub', style: 'text-align:right;width:110px' }, ago(o.built)),
      el('td', { style: 'text-align:right;width:76px' },
        el('button', {
          class: 'btn sm', onclick: () => playVideo(o.name)
        }, 'Play'))))))
    : el('div', { class: 'sub' }, 'Nothing rendered yet.')));
}

// ═══ review visuals ═══════════════════════════════════════════════════════
async function viewReview(id) {
  const d = await api('/api/approval?id=' + encodeURIComponent(id));
  const v = $('#view'); v.innerHTML = '';
  v.append(el('div', { class: 'head' }, el('div', { class: 'grow' },
    el('div', { class: 'back', onclick: () => go('/project/' + id) }, '← ' + id),
    el('h1', { style: 'margin-top:4px' }, 'Review visuals'),
    el('p', {}, 'Click any picture that does not suit its line. Anything you leave alone '
      + 'is approved — there is no approve button. Gold border marks a scene that carries the story.'))));

  const items = d.items || [];
  if (!items.length) {
    v.append(el('div', { class: 'empty card' }, el('b', {}, 'Nothing sourced yet'),
      'Run "Find visuals" first.'));
    return;
  }
  const rejected = new Set();
  const count = el('span', { class: 'sub' }, '0 marked for replacement');

  v.append(el('div', { class: 'card', style: 'margin-bottom:14px' }, el('div', { class: 'row' },
    count, el('div', { style: 'flex:1' }),
    d.missing?.length ? el('span', { class: 'pill bad' }, `${d.missing.length} with no match`) : null,
    el('button', {
      class: 'btn primary', onclick: async e => {
        if (!rejected.size) return toast('Nothing marked yet.');
        e.target.disabled = true;
        const r = await api('/api/source', { id, redo: [...rejected] });
        if (r.started) go('/activity'); else e.target.disabled = false;
      }
    }, 'Get new pictures for these'))));

  v.append(el('div', { class: 'thumbs' }, items.map(s => {
    const t = el('div', {
      class: 'thumb' + (s.hero ? ' hero' : ''),
      title: `S${s.n} · ${s.narration || ''}`,
      onclick: e => {
        const n = e.currentTarget;
        if (rejected.has(s.n)) { rejected.delete(s.n); n.classList.remove('rej'); }
        else { rejected.add(s.n); n.classList.add('rej'); }
        count.textContent = `${rejected.size} marked for replacement`;
      }
    }, el('span', { class: 'n' }, 'S' + s.n));
    if (s.url) t.append(s.video
      ? el('video', {
        src: s.url, muted: true, loop: true, playsinline: true, preload: 'metadata',
        onmouseenter: e => e.target.play().catch(() => { }),
        onmouseleave: e => e.target.pause()
      })
      : el('img', { src: s.url, loading: 'lazy', alt: s.query || '' }));
    return t;
  })));
}

// ═══ player ═══════════════════════════════════════════════════════════════
function playVideo(name, title) {
  const v = el('video', {
    src: '/out/' + encodeURIComponent(name),
    controls: true, autoplay: true, playsinline: true,
    style: 'width:100%;border-radius:8px;background:#000;max-height:70vh'
  });
  const modal = el('div', {
    class: 'modal',
    onclick: e => { if (e.target === modal) { v.pause(); modal.remove(); } }
  },
    el('div', { class: 'box', style: 'max-width:900px' },
      el('div', { class: 'row', style: 'margin-bottom:10px' },
        el('h3', { style: 'flex:1' }, title || name),
        el('button', {
          class: 'btn sm',
          onclick: () => window.open('/out/' + encodeURIComponent(name), '_blank')
        }, 'Open in tab'),
        el('button', {
          class: 'btn sm',
          onclick: () => api('/api/reveal', { path: name })
        }, 'Show in folder'),
        el('button', {
          class: 'btn sm', onclick: () => { v.pause(); modal.remove(); }
        }, 'Close')),
      v,
      el('div', { class: 'sub mono', style: 'margin-top:8px' }, name)));
  document.body.append(modal);
}

// ═══ delete ═══════════════════════════════════════════════════════════════
// Deliberately granular. "Clear narration" and "delete the whole project" are
// very different acts, and one button for both is how people lose work.
// Removing the sheets means removing the project, so that one needs its name
// typed — a stray click must not be able to do it.
const GROUPS = [
  ['outputs', 'Rendered videos', 'the .mp4 and .srt files in out/'],
  ['voice', 'Narration cache', 'generated audio — regenerating costs GPU time'],
  ['visuals', 'Visual choices', 'which clip belongs to which scene, and your picks'],
  ['work', 'Working files', 'intermediate clips; always safe to remove'],
  ['sheets', 'The sheets themselves', 'DELETES THE PROJECT — scripts and translations'],
];

async function askDelete(id) {
  const d = await api('/api/deletable?id=' + encodeURIComponent(id));
  if (d.error) return toast(d.error, true);
  const picked = new Set();
  const confirmBox = el('input', { type: 'text', placeholder: `type ${id} to confirm` });
  const confirmWrap = el('div', { style: 'display:none;margin-top:12px' },
    el('div', { class: 'sub', style: 'margin-bottom:5px;color:var(--bad)' },
      'This removes the scripts and translations. It cannot be undone.'),
    confirmBox);

  const go = el('button', { class: 'btn danger', disabled: true }, 'Delete');
  const sync = () => {
    const needsName = picked.has('sheets');
    confirmWrap.style.display = needsName ? '' : 'none';
    const total = [...picked].reduce((a, k) => a + (d.groups[k]?.mb || 0), 0);
    go.textContent = picked.size
      ? `Delete ${picked.size} group(s) · ${total.toFixed(1)} MB` : 'Delete';
    go.disabled = !picked.size || (needsName && confirmBox.value.trim() !== id);
  };
  confirmBox.addEventListener('input', sync);

  const rows = GROUPS.map(([key, title, note]) => {
    const g = d.groups[key] || { count: 0, mb: 0 };
    const box = el('input', {
      type: 'checkbox', disabled: !g.count,
      onchange: e => { e.target.checked ? picked.add(key) : picked.delete(key); sync(); }
    });
    return el('label', { class: 'dgroup', style: g.count ? '' : 'opacity:.45' },
      box,
      el('div', { class: 'what' },
        el('b', { style: key === 'sheets' ? 'color:var(--bad)' : '' }, title),
        el('div', { class: 'sub' }, note)),
      el('span', { class: 'sub mono' }, g.count ? `${g.count} · ${g.mb} MB` : 'none'));
  });

  const modal = el('div', { class: 'modal' },
    el('div', { class: 'box' },
      el('h3', {}, 'Delete from ' + id),
      el('div', { class: 'sub', style: 'margin-bottom:12px' },
        'Downloaded stock footage is never removed — it is shared between '
        + 'projects, so deleting it here would break others.'),
      el('div', {}, rows),
      confirmWrap,
      el('div', { class: 'row', style: 'margin-top:18px;justify-content:flex-end' },
        el('button', { class: 'btn', onclick: () => modal.remove() }, 'Cancel'),
        go)));

  go.onclick = async () => {
    go.disabled = true; go.textContent = 'Deleting…';
    const r = await api('/api/delete', {
      id, what: [...picked], confirm: confirmBox.value.trim()
    });
    modal.remove();
    if (r.error) return toast(r.error, true);
    toast(`Deleted ${r.count} file(s), freed ${r.freed_mb} MB.`);
    go(picked.has('sheets') ? '/' : '/project/' + id);
  };
  document.body.append(modal);
  sync();
}

// ═══ banner ═══════════════════════════════════════════════════════════════
// A job used to be invisible unless you happened to be on the Activity page,
// and a failure only showed as a toast that vanished. This sits above every
// view until you have actually seen the outcome.
function paintBanner() {
  const b = $('#banner'); if (!b) return;
  const j = S.status || {};
  const running = BUSY.includes(j.stage);
  const failed = j.stage === 'error' && j.error;

  if (!running && !failed) { b.style.display = 'none'; return; }
  b.style.display = ''; b.className = failed ? 'err' : '';
  b.innerHTML = '';

  if (failed) {
    b.append(
      el('b', { style: 'color:var(--bad)' }, 'Stopped'),
      el('span', { style: 'flex:1' }, j.error),
      el('button', { class: 'btn sm', onclick: () => go('/activity') }, 'Details'),
      el('button', {
        class: 'btn sm',
        onclick: () => { S.status = { ...j, stage: 'idle', error: '' }; paintBanner(); }
      }, 'Dismiss'));
    return;
  }

  const pct = j.total ? Math.round(100 * j.done / j.total) : 0;
  b.append(
    el('span', { class: 'spin' }),
    el('b', {}, j.project || ''),
    el('span', { style: 'color:var(--ink2)' }, j.label || j.stage),
    el('div', { class: 'bar' }, el('i', { style: `width:${pct}%` })),
    el('span', { class: 'mono sub' },
      (j.total ? `${j.done}/${j.total}` : '') + (j.eta != null ? ` · ${fmtT(j.eta)} left` : '')),
    el('div', { style: 'flex:1' }),
    el('button', { class: 'btn sm', onclick: () => go('/activity') }, 'Watch'),
    el('button', {
      class: 'btn sm danger',
      onclick: async e => { e.target.disabled = true; await api('/api/cancel', {}); }
    }, 'Stop'));
}

// ═══ router ═══════════════════════════════════════════════════════════════
// Real URLs via the History API — /project/video05, not #/project/video05.
// The server hands back this page for any non-asset path, so every route can
// be typed, bookmarked, reloaded and shared, and Back/Forward behave normally.
const ROUTES = [
  [/^\/$/, viewDashboard],
  [/^\/dashboard\/?$/, viewDashboard],
  [/^\/project\/([^/]+)\/?$/, viewProject],
  [/^\/review\/([^/]+)\/?$/, viewReview],
  [/^\/activity\/?$/, viewRun],
  [/^\/new\/?$/, viewNew],
  [/^\/voices(?:\/([a-z-]+))?\/?$/, viewVoices],
  [/^\/settings\/?$/, viewSettings],
];

/** Navigate without reloading. Use this everywhere instead of location.href. */
function go(path, replace) {
  if (path === location.pathname) return route();
  history[replace ? 'replaceState' : 'pushState']({}, '', path);
  route();
}

async function route() {
  const path = location.pathname;
  for (const [re, fn] of ROUTES) {
    const m = path.match(re);
    if (!m) continue;
    document.querySelectorAll('.nav').forEach(n => {
      const r = n.dataset.r;
      n.classList.toggle('on', r === '/' ? (path === '/' || path === '/dashboard')
        : path.startsWith(r));
    });
    try { await fn(m[1] ? decodeURIComponent(m[1]) : undefined); }
    catch (e) {
      $('#view').innerHTML = '';
      $('#view').append(el('div', { class: 'empty card' },
        el('b', {}, 'That view failed to load'),
        el('div', { class: 'mono sub' }, String((e && e.message) || e))));
    }
    paintBanner();
    window.scrollTo(0, 0);
    return;
  }
  // Unknown address — say so rather than silently bouncing to the dashboard.
  $('#view').innerHTML = '';
  $('#view').append(el('div', { class: 'empty card' },
    el('b', {}, 'Nothing at this address'),
    el('div', { class: 'mono sub' }, path),
    el('div', { style: 'margin-top:14px' },
      el('button', { class: 'btn', onclick: () => go('/') }, 'Go to the dashboard'))));
}

addEventListener('popstate', route);
// Any element carrying data-r is a route link — the nav items and the sidebar
// "New video" button. Anchors get a real href so they behave like links.
document.querySelectorAll('[data-r]').forEach(n => {
  if (n.tagName === 'A') n.setAttribute('href', n.dataset.r);
  n.onclick = e => { e.preventDefault(); go(n.dataset.r); };
});

// ═══ polling ══════════════════════════════════════════════════════════════
let lastStage = null;
async function poll() {
  try {
    const j = await api('/api/status');
    S.status = j;
    const busy = BUSY.includes(j.stage);
    const badge = $('#navBadge');
    badge.style.display = busy ? '' : 'none';
    if (busy) badge.textContent = j.total ? Math.round(100 * j.done / j.total) + '%' : '···';

    paintBanner();
    if (location.pathname === '/activity') paintRun();

    // A run just ended — refresh whatever is on screen so the status is honest.
    if (lastStage && lastStage !== j.stage && ['done', 'approve', 'error'].includes(j.stage)) {
      if (j.stage === 'done') toast('Finished.');
      if (j.stage === 'error') toast(j.error || 'Something failed — see Activity.', true);
      if (j.stage === 'approve') toast('Visuals ready to review.');
      if (location.pathname === '/' || location.pathname === '/dashboard'
          || location.pathname.startsWith('/project/')) route();
    }
    lastStage = j.stage;
  } catch (e) { /* server restarting — try again on the next tick */ }
  setTimeout(poll, 900);
}

route();
poll();
</script>
